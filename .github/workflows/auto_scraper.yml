name: Automated Cloud Scraper

on:
  schedule:
    - cron: '0 9 * * *'  # Automatically runs every single day at 9:00 AM IST
  push:
    branches: [ main ]  # Also triggers instantly right now when you push it
  
  workflow_dispatch:

jobs:
  run-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: pip install requests beautifulsoup4

    - name: Run Scraper Script
      run: python scraper.py

    # Automatically saves the updated CSV file back to your project repo
    - name: Commit and Push CSV Updates
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add price_history.csv
        git commit -m "chore: automated daily data update [skip ci]" || echo "No changes to commit"
        git push origin master
